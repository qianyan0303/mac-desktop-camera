appId: com.vibemirror.app
productName: vibemirror
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
afterSign: build/notarize.js
win:
  executableName: vibemirror
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # 最低系统版本，下面指生成arm，因为最低版本是12
  # minimumSystemVersion: 12
  entitlementsInherit: build/entitlements.mac.plist
  icon: resources/icon.png
  target:
    - mas
  extendInfo:
    NSCameraUsageDescription: 软件需要使用你的摄像头，用于显示你的视频画面.
    # - NSMicrophoneUsageDescription: 请允许本程序访问您的麦克风
    # - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    # - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
mas:
  hardenedRuntime: false
  type: distribution
  category: public.app-category.utilities
  entitlements: build/entitlements.mas.plist
  entitlementsInherit: build/entitlements.mas.inherit.plist
  provisioningProfile: build/camera.provisionprofile
  # extendInfo:
  #   - NSCameraUsageDescription: 软件需要使用你的摄像头，用于显示你的视频画面.
dmg:
  artifactName: ${name}-${version}.${ext}
  sign: false
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
